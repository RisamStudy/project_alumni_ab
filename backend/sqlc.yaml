version: "2"
sql:
  - engine: "mysql"
    queries: "./db/query/queries.sql"
    schema:
      - "./db/migrations/001_init.sql"
      - "./db/migrations/002_add_instagram_to_profiles.sql"
    gen:
      go:
        package: "sqlc"
        out: "./db/sqlc"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
